<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Credify AI</title>

  <style>
    body {
      background: #0b0f19;
      color: #fff;
      font-family: Arial;
      padding: 30px;
    }

    input, select {
      padding: 10px;
      margin: 8px;
      width: 250px;
    }

    button {
      padding: 12px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .card {
      background: #121826;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .error {
      color: red;
    }

    .online { color: lightgreen; }
    .offline { color: red; }
  </style>
</head>

<body>

<h1>Credify AI 🚀</h1>
<p id="statusText" class="offline">API Offline</p>

<div class="card">
  <h2>Applicant Details</h2>

  <input id="AGE" placeholder="Age" value="35"><br>
  <input id="YEARS_EMPLOYED" placeholder="Years Employed" value="5"><br>
  <input id="AMT_INCOME_TOTAL" placeholder="Income" value="450000"><br>

  <select id="EMPLOYMENT_TYPE">
    <option>Salaried</option>
    <option>Self-Employed</option>
    <option>Student</option>
    <option>Government</option>
  </select><br>

  <select id="FLAG_OWN_REALTY">
    <option value="Y">Own Property</option>
    <option value="N">No Property</option>
  </select><br>

  <input id="CNT_FAM_MEMBERS" placeholder="Family Members" value="3"><br>
  <input id="CNT_CHILDREN" placeholder="Children" value="1"><br>

  <button onclick="submitForm()">Analyse My Profile</button>

  <p class="error" id="errorBox"></p>
</div>

<div class="card" id="result">
  <h2>Result will appear here</h2>
</div>

<script>

// ✅ FIXED API BASE (IMPORTANT)
const API = "";

// 🔍 Health check
async function checkHealth() {
  try {
    const res = await fetch("/api/health");
    if (res.ok) {
      document.getElementById("statusText").innerText = "API Online";
      document.getElementById("statusText").className = "online";
    }
  } catch {
    document.getElementById("statusText").innerText = "API Offline";
    document.getElementById("statusText").className = "offline";
  }
}

// 🚀 Submit form
async function submitForm() {

  document.getElementById("errorBox").innerText = "";

  const payload = {
    AGE: parseInt(document.getElementById("AGE").value),
    YEARS_EMPLOYED: parseFloat(document.getElementById("YEARS_EMPLOYED").value),
    AMT_INCOME_TOTAL: parseFloat(document.getElementById("AMT_INCOME_TOTAL").value),
    EMPLOYMENT_TYPE: document.getElementById("EMPLOYMENT_TYPE").value,
    FLAG_OWN_REALTY: document.getElementById("FLAG_OWN_REALTY").value,
    CNT_FAM_MEMBERS: parseInt(document.getElementById("CNT_FAM_MEMBERS").value),
    CNT_CHILDREN: parseInt(document.getElementById("CNT_CHILDREN").value)
  };

  try {
    const res = await fetch("/api/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    document.getElementById("result").innerHTML = `
      <h2>${data.decision}</h2>
      <p>Confidence: ${data.confidence}%</p>
      <p>Risk Score: ${data.risk_score}</p>
      <p>Credit Score: ${data.credit_score}</p>
      <p>Risk Level: ${data.risk_level}</p>
      <p>Interest Rate: ${data.interest_rate}%</p>
    `;

  } catch (err) {
    document.getElementById("errorBox").innerText = "Error: " + err.message;
  }
}

// 🔄 Run on load
checkHealth();

</script>

</body>
</html>
